// Virtual resolution; everything is drawn in this space then scaled.
const W = 400, H = 640;
canvas.width = W; canvas.height = H;

function fit() {
  const pad = 24;
  const maxW = window.innerWidth - pad;
  const maxH = window.innerHeight - pad;
  const scale = Math.min(maxW / W, maxH / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', fit); fit();

let best = 0;
let score, bird, pipes, frame, shake, particles;

function reset() {
  score = 0;
  frame = 0;
  shake = 0;
  particles = [];
  bird = { x: 110, y: H * 0.42, vy: 0, r: 15, rot: 0 };
  pipes = [];
  spawnPipe(W + 60);
  spawnPipe(W + 60 + PIPE_SPACING);
}

function spawnPipe(x) {
  const margin = 90;
  const gapY = margin + Math.random() * (FLOOR - GAP - margin * 2);
  pipes.push({ x, gapY, passed: false });
}

function flap() {
  if (state === 'start') { state = 'playing'; reset(); state = 'playing'; }
  if (state === 'playing') {
    bird.vy = FLAP;
    for (let i = 0; i < 5; i++) {
      particles.push({
        x: bird.x - 6, y: bird.y + 4,
        vx: -1 - Math.random() * 2, vy: (Math.random() - 0.5) * 2,
        life: 1, r: 2 + Math.random() * 2
      });
    }
  } else if (state === 'over') {
    state = 'start';
    reset();
  }
}

// ---- Input ----
function onPress(e) { e.preventDefault(); flap(); }
canvas.addEventListener('mousedown', onPress);
canvas.addEventListener('touchstart', onPress, { passive: false });
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});

// ---- Stars (static backdrop) ----
const stars = Array.from({ length: 50 }, () => ({
  x: Math.random() * W,
  y: Math.random() * (FLOOR * 0.7),
  r: Math.random() * 1.4 + 0.3,
  tw: Math.random() * Math.PI * 2
}));

// ---- Skyline silhouette (parallax) ----
const skyline = Array.from({ length: 22 }, (_, i) => ({
  x: i * 26 - 20,
  w: 22 + Math.random() * 16,
  h: 50 + Math.random() * 120
}));
let skyOff = 0;

// ---- Drawing helpers ----
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawBackground() {
  ctx.fillStyle = '#0d0a1a';
  ctx.fillRect(0, 0, W, FLOOR);
  if (bgImg.complete && bgImg.naturalWidth) {
    // cover-fit the photo into the play area
    const ar = bgImg.naturalWidth / bgImg.naturalHeight;
    const areaAR = W / FLOOR;
    let dw, dh, dx, dy;
    if (ar > areaAR) { dh = FLOOR; dw = dh * ar; dx = (W - dw) / 2; dy = 0; }
    else { dw = W; dh = dw / ar; dx = 0; dy = (FLOOR - dh) / 2; }
    ctx.drawImage(bgImg, dx, dy, dw, dh);
    // darken slightly so the bird, pipes and score stay readable
    ctx.fillStyle = 'rgba(13,10,26,0.32)';
    ctx.fillRect(0, 0, W, FLOOR);
  }

}

function drawPipe(p) {
  const topH = p.gapY;
  const botY = p.gapY + GAP;
  const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  grad.addColorStop(0, '#2a1838');
  grad.addColorStop(0.5, '#5e3a6e');
  grad.addColorStop(1, '#1f1029');

  ctx.fillStyle = grad;
  // top pipe
  roundRect(p.x, -20, PIPE_W, topH + 20, 8); ctx.fill();
  roundRect(p.x - 5, topH - 22, PIPE_W + 10, 22, 6); ctx.fill();
  // bottom pipe
  roundRect(p.x, botY, PIPE_W, FLOOR - botY, 8); ctx.fill();
  roundRect(p.x - 5, botY, PIPE_W + 10, 22, 6); ctx.fill();

  // rim highlight
  ctx.fillStyle = 'rgba(255,170,120,0.35)';
  ctx.fillRect(p.x + 4, topH - 22, 4, 22 + topH);
  ctx.fillRect(p.x + 4, botY, 4, FLOOR - botY);
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot);

  const R = bird.r + 3;

  // soft glow halo
  const glow = ctx.createRadialGradient(0, 0, 4, 0, 0, R + 14);
  glow.addColorStop(0, 'rgba(180,200,210,0.55)');
  glow.addColorStop(1, 'rgba(180,200,210,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(0, 0, R + 14, 0, Math.PI * 2); ctx.fill();

  // wing (flaps with velocity)
  const wingUp = bird.vy < 0;
  ctx.fillStyle = 'rgba(40,18,41,0.85)';
  ctx.beginPath();
  ctx.ellipse(-R + 2, wingUp ? -4 : 6, 10, 6, wingUp ? -0.5 : 0.5, 0, Math.PI * 2);
  ctx.fill();

  // circular face sprite
  if (birdImg.complete && birdImg.naturalWidth) {
    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.clip();
    ctx.drawImage(birdImg, -R, -R, R * 2, R * 2);
    ctx.restore();
  } else {
    ctx.fillStyle = '#c9b8a0';
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.fill();
  }
  // rim
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI * 2); ctx.stroke();

  ctx.restore();
}

function drawGround() {
  ctx.fillStyle = '#241229';
  ctx.fillRect(0, FLOOR, W, GROUND_H);
  ctx.fillStyle = 'rgba(255,138,92,0.25)';
  ctx.fillRect(0, FLOOR, W, 4);
  // moving stripes
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  const off = (frame * PIPE_SPEED) % 40;
  for (let x = -off; x < W; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, FLOOR + 14);
    ctx.lineTo(x + 18, FLOOR + 14);
    ctx.lineTo(x + 10, FLOOR + GROUND_H);
    ctx.lineTo(x - 8, FLOOR + GROUND_H);
    ctx.closePath(); ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = '#ffe082';
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function text(str, x, y, size, color, align) {
  ctx.font = size + "px 'Press Start 2P', monospace";
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillText(str, x + 2, y + 2);
  ctx.fillStyle = color;
  ctx.fillText(str, x, y);
}

function drawOverlay() {
  if (state === 'start') {
    text('PARKER', W / 2, H * 0.30, 30, '#ffe082');
    text('JUMP', W / 2, H * 0.30 + 44, 34, '#ff8a5c');
    const pulse = 0.6 + 0.4 * Math.sin(frame * 0.08);
    ctx.globalAlpha = pulse;
    text('TAP TO FLY', W / 2, H * 0.58, 13, '#ffffff');
    ctx.globalAlpha = 1;
    text('SPACE / CLICK / TAP', W / 2, H * 0.58 + 30, 8, 'rgba(255,255,255,0.6)');
  } else if (state === 'over') {
    ctx.fillStyle = 'rgba(13,10,26,0.55)';
    ctx.fillRect(0, 0, W, H);
    text('GAME OVER', W / 2, H * 0.32, 24, '#ff8a5c');
    text('SCORE  ' + score, W / 2, H * 0.46, 14, '#ffffff');
    text('BEST   ' + best, W / 2, H * 0.46 + 32, 14, '#ffe082');
    const pulse = 0.6 + 0.4 * Math.sin(frame * 0.08);
    ctx.globalAlpha = pulse;
    text('TAP TO RETRY', W / 2, H * 0.66, 12, '#ffffff');
    ctx.globalAlpha = 1;
  }
  if (state !== 'over') {
    text(String(score), W / 2, 70, 30, '#ffffff');
  }
}

// ---- Update ----
function update() {
  frame++;
  skyOff += 0.15;

  // particles always animate
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.life -= 0.04;
  }
  particles = particles.filter(p => p.life > 0);

  if (state === 'playing') {
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.rot = Math.max(-0.5, Math.min(1.4, bird.vy * 0.06));

    // pipes
    for (const p of pipes) p.x -= PIPE_SPEED;
    if (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
    const last = pipes[pipes.length - 1];
    if (last && last.x < W - PIPE_SPACING) spawnPipe(last.x + PIPE_SPACING);

    // scoring
    for (const p of pipes) {
      if (!p.passed && p.x + PIPE_W < bird.x) { p.passed = true; score++; }
    }

    // collisions
    if (bird.y + bird.r > FLOOR) { bird.y = FLOOR - bird.r; die(); }
    if (bird.y - bird.r < 0) { bird.y = bird.r; bird.vy = 0; }
    for (const p of pipes) {
      const hit = bird.r - 4; // forgiveness margin
      if (bird.x + hit > p.x && bird.x - hit < p.x + PIPE_W) {
        if (bird.y - hit < p.gapY || bird.y + hit > p.gapY + GAP) { die(); }
      }
    }
  } else if (state === 'over') {
    // bird falls to ground
    if (bird.y + bird.r < FLOOR) {
      bird.vy += GRAVITY;
      bird.y += bird.vy;
      bird.rot = Math.min(1.6, bird.rot + 0.08);
    } else {
      bird.y = FLOOR - bird.r;
    }
  }
  if (shake > 0) shake *= 0.85;
}

function die() {
  if (state !== 'playing') return;
  state = 'over';
  shake = 10;
  best = Math.max(best, score);
}

// ---- Loop ----
function loop() {
  update();
  ctx.save();
  if (shake > 0.5) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  ctx.clearRect(-20, -20, W + 40, H + 40);
  drawBackground();
  for (const p of pipes) drawPipe(p);
  drawGround();
  drawParticles();
  drawBird();
  ctx.restore();
  drawOverlay();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
